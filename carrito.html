<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAVA-PEDIDOS</title>
    <link rel="stylesheet" href="css/carrito.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    
    <header>
        <h3>LA CAVA</h3>
        <a href="index.html">VOLVER A INICIO</a>
    </header>
    <main>
        <section id="productos">
            <h2>Productos</h2>
            <div class="producto" data-id="1">
                <h3>Yogur Natural</h3>
                <p>Precio: $2.00</p>
                <button class="agregar-carrito">Añadir al carrito</button>
            </div>
            <div class="producto" data-id="2">
                <h3>Yogur con Fresas</h3>
                <p>Precio: $2.50</p>
                <button class="agregar-carrito">Añadir al carrito</button>
            </div>
            <div class="producto" data-id="3">
                <h3>Yogur con Miel</h3>
                <p>Precio: $2.75</p>
                <button class="agregar-carrito">Añadir al carrito</button>
            </div>
        </section>
        <section id="carrito">
            <h2>Carrito de Compras</h2>
            <ul id="lista-carrito">
                <!-- Items del carrito se añadirán aquí -->
            </ul>
            <p>Total: $<span id="total">0.00</span></p>
            <button id="limpiar-carrito">Limpiar Carrito</button>
        </section>
    </main>
    <script src="js/carrito.js"></script>
</body>
</html>
